<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scribe — 會議即時轉錄 + 問答</title>
<style>
  body { font-family: system-ui, "Noto Sans TC", sans-serif; max-width: 820px;
         margin: 32px auto; padding: 0 16px; line-height: 1.7; color: #111; }
  h1 { font-size: 20px; } h2 { font-size: 16px; margin-top: 28px; }
  .row { margin: 10px 0; }
  #out { border: 1px solid #ccc; border-radius: 10px; padding: 16px; min-height: 120px; font-size: 21px; }
  .committed { color: #111; } .tentative { color: #999; font-style: italic; } .final { color: #0a7; }
  button { font-size: 15px; padding: 8px 16px; border-radius: 8px; border: 1px solid #888; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  #status { color: #666; font-size: 13px; }
  input[type=text] { font-size: 14px; padding: 7px; }
  #chat { border: 1px solid #ccc; border-radius: 10px; padding: 12px; min-height: 120px; max-height: 340px; overflow-y: auto; background:#fafafa; }
  .msg { margin: 8px 0; padding: 8px 12px; border-radius: 10px; max-width: 85%; white-space: pre-wrap; }
  .u { background: #dceeff; margin-left: auto; } .a { background: #fff; border:1px solid #eee; }
  .who { font-size: 11px; color:#888; margin-bottom:2px; }
</style>
</head>
<body>
<h1>scribe — 會議即時轉錄 + 問答</h1>

<div class="row">伺服器：<input id="url" type="text" size="34" value="ws://localhost:8005/ws/asr"></div>

<h2>① 即時逐字稿（灰字＝預覽，黑/綠＝定稿）</h2>
<div class="row">
  <button id="start">🎙️ 開始</button>
  <button id="stop" disabled>⏹️ 結束（定稿）</button>
  <button id="clear">🗑️ 清空</button>
  <span id="status">待命</span>
</div>
<div id="out"><span class="committed"></span><span class="tentative"></span></div>

<h2>② 問這場會議</h2>
<div id="chat"><div style="color:#999">先錄一段會議並按「結束」定稿，然後在下面問問題。</div></div>
<div class="row">
  <input id="q" type="text" size="52" placeholder="例如：這場會議有哪些待辦事項？" disabled>
  <button id="send" disabled>送出</button>
</div>

<script>
const $ = (id) => document.getElementById(id);
const setStatus = (s) => $("status").textContent = s;
let ws, ctx, node, stream;
let committedText = "", finalTranscript = "";
let history = [];

function httpBase() {
  // 由 ws url 推出 http base:ws://host:8005/ws/asr -> http://host:8005
  const u = $("url").value.trim();
  return u.replace(/^ws/, "http").replace(/\/ws\/asr\/?$/, "");
}
function render(committed, tentative) {
  $("out").innerHTML = `<span class="committed">${committed||""}</span><span class="tentative">${tentative||""}</span>`;
}
function enableChat(on) { $("q").disabled = !on; $("send").disabled = !on; }

// ---------- ① 錄音 / 轉錄 ----------
$("start").onclick = async () => {
  ws = new WebSocket($("url").value);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => setStatus("已連線，開始說話…");
  ws.onclose = () => setStatus("連線關閉");
  ws.onerror = () => setStatus("連線錯誤");
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === "partial") { committedText = m.committed; render(m.committed, m.tentative); }
    else if (m.type === "final") {
      finalTranscript = (finalTranscript ? finalTranscript + "\n" : "") + (m.text || "");
      $("out").innerHTML = `<span class="final">${finalTranscript}</span>`;
      setStatus("已定稿 ✅ 可以在下面問這場會議了");
      enableChat(true);
    } else if (m.type === "error") setStatus("錯誤：" + m.detail);
  };
  ctx = new AudioContext({ sampleRate: 16000 });
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const src = ctx.createMediaStreamSource(stream);
  node = ctx.createScriptProcessor(4096, 1, 1);
  src.connect(node); node.connect(ctx.destination);
  node.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== 1) return;
    const f = e.inputBuffer.getChannelData(0), i16 = new Int16Array(f.length);
    for (let i = 0; i < f.length; i++) { const s = Math.max(-1, Math.min(1, f[i])); i16[i] = s < 0 ? s*0x8000 : s*0x7fff; }
    ws.send(i16.buffer);
  };
  $("start").disabled = true; $("stop").disabled = false;
};
$("stop").onclick = () => {
  try { node && node.disconnect(); } catch {}
  try { stream && stream.getTracks().forEach(t => t.stop()); } catch {}
  try { ctx && ctx.close(); } catch {}
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "end" }));
  $("start").disabled = false; $("stop").disabled = true;
  setStatus("已送出 end，等待定稿…");
};
$("clear").onclick = () => {
  committedText = ""; finalTranscript = ""; history = [];
  render("", ""); $("chat").innerHTML = '<div style="color:#999">先錄一段會議並定稿，再問問題。</div>';
  enableChat(false); setStatus("已清空");
};

// ---------- ② 問這場會議 ----------
function addMsg(who, text, cls) {
  if ($("chat").querySelector('div[style]')) $("chat").innerHTML = "";  // 清掉提示
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = `<div class="who">${who}</div><span class="body"></span>`;
  d.querySelector(".body").textContent = text;
  $("chat").appendChild(d); $("chat").scrollTop = $("chat").scrollHeight;
  return d.querySelector(".body");
}

async function ask() {
  const q = $("q").value.trim();
  const transcript = finalTranscript || committedText;
  if (!q || !transcript) return;
  $("q").value = ""; enableChat(false);
  addMsg("你", q, "u");
  const bodyEl = addMsg("scribe", "", "a");

  try {
    const resp = await fetch(httpBase() + "/meeting/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ transcript, question: q, history }),
    });
    const reader = resp.body.getReader(), dec = new TextDecoder();
    let buf = "", answer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") continue;
        const obj = JSON.parse(data);
        if (obj.error) { bodyEl.textContent += "\n[錯誤] " + obj.error; }
        else if (obj.delta) { answer += obj.delta; bodyEl.textContent = answer; $("chat").scrollTop = $("chat").scrollHeight; }
      }
    }
    history.push({ role: "user", content: q }, { role: "assistant", content: answer });
  } catch (e) { bodyEl.textContent += "\n[連線失敗] " + e; }
  enableChat(true); $("q").focus();
}
$("send").onclick = ask;
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });
</script>
</body>
</html>
